spring:
  application:
    name: smart-hr-portal

  # ── MySQL Database ────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/hrportal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update          # creates tables on first run, updates on changes
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ── File Upload ───────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Disable unused auto-configurations ───────────────────────────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:SmartHRPortalSecretKey2024SuperSecureKeyMinimum256BitsLong!!}
  expiration: 86400000   # 24 hours

# ── AI API (Claude or Gemini) ─────────────────────────────────────────────────
# Paste your key below:
#   Claude key starts with: sk-ant-   → get from https://console.anthropic.com
#   Gemini key starts with: AIza      → get FREE from https://aistudio.google.com
claude:
  api:
    key: ${CLAUDE_API_KEY:PASTE_YOUR_KEY_HERE}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-20250514
    max-tokens: 2048

# ── File Storage ──────────────────────────────────────────────────────────────
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads/resumes}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.hrportal: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
    root: WARN
